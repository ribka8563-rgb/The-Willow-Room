
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | The Willow Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page" style="background: #f4f7f6; padding: 40px;">
    <div class="main" style="max-width: 800px; margin: auto;">
        <h1 style="color: #5e716a;">Admin Control Center</h1>
        <p>Manage the sanctuary content without touching code.</p>

        <div class="card" style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h3>1. Update Health Video</h3>
            <p style="font-size: 0.9rem; color: #666;">Go to YouTube -> Share -> Embed. Copy the &lt;iframe&gt; code here.</p>
            <textarea id="videoLinkInput" style="width: 100%; height: 80px; margin: 10px 0; border: 1px solid #ddd;"></textarea>
            <button onclick="saveVideo()" style="background: #8DA399; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Publish Video</button>
        </div>

        <div class="card" style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h3>2. Update Home Welcome Message</h3>
            <textarea id="homeMessageInput" style="width: 100%; height: 80px; margin: 10px 0; border: 1px solid #ddd;"></textarea>
            <button onclick="saveMessage()" style="background: #8DA399; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Update Homepage</button>
        </div>

        <div style="text-align: center;">
            <a href="index.html" style="color: #8DA399; text-decoration: none;">← Back to Website</a>
        </div>
    </div>

    <script>
        function saveVideo() {
            const videoCode = document.getElementById('videoLinkInput').value;
            if(videoCode.includes('<iframe')) {
                localStorage.setItem('adminVideo', videoCode);
                alert("Success! Video is now live on the Health page.");
            } else {
                alert("Please paste a valid YouTube Embed code.");
            }
        }

        function saveMessage() {
            const msg = document.getElementById('homeMessageInput').value;
            localStorage.setItem('adminMessage', msg);
            alert("Success! The Home Page has been updated.");
        }
    </script>
    <script>const MASTER_ADMIN_EMAIL = 'ribka8563@gmail.com'; 

function checkAccessAndAdmin() {
    const userEmail = localStorage.getItem('willowUser') || localStorage.getItem('userEmail');
    
    const adminBadges = document.querySelectorAll('.admin-badge, #adminBadge');
    const adminLink = document.getElementById('admin-link');
    if (document.body.classList.contains('private-page') && !userEmail) {
        window.location.href = 'login.html';
        return;
    }

    if (userEmail === MASTER_ADMIN_EMAIL) {
        adminBadges.forEach(badge => badge.style.display = 'inline-block');
        if (adminLink) adminLink.style.display = 'block';
    }
}
</script>
</body>
</html>
